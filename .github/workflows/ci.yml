name: CI

on:
    pull_request:
    push:
        branches: [main]

# Verification only — never write to the repo, never deploy.
permissions:
    contents: read

# A newer push to the same ref supersedes an in-flight run.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    verify:
        name: Lint, format, tests, typecheck
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11

            - name: Setup Node 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup uv + Python 3.12
              uses: astral-sh/setup-uv@v5
              with:
                  python-version: "3.12"
                  enable-cache: true
                  cache-dependency-glob: scripts/uv.lock

            # --- Quality gates (each a separate, visible step) ---

            - name: Lint
              run: pnpm lint

            - name: Format check
              run: pnpm format:check

            - name: TypeScript tests
              run: pnpm test:ts

            - name: TypeScript coverage
              run: pnpm test:ts:cov

            - name: Python tests
              run: pnpm test:py

            - name: Python coverage
              run: pnpm test:py:cov

            - name: Typecheck
              run: pnpm typecheck

    # Integration + E2E smoke (feature 046 / TEST-004): a SEPARATE job from `verify` because it
    # builds the app + provisions local Miniflare (D1/R2) + drives a headless browser, so it is
    # slower and its failures should be independently visible. Runs in parallel with `verify`.
    # If runtime ever exceeds budget, move it to `main` pushes + nightly by changing ONLY the
    # `on`/`if` here — no test-code change.
    e2e:
        name: Integration + E2E smoke (seeded local D1/R2)
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: 11

            - name: Setup Node 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup uv + Python 3.12
              uses: astral-sh/setup-uv@v5
              with:
                  python-version: "3.12"
                  enable-cache: true
                  cache-dependency-glob: scripts/uv.lock

            - name: Install Chromium for Playwright (Python)
              run: cd scripts && uv run playwright install --with-deps chromium

            # Provision a fresh shared local Miniflare state (.wrangler/state-test): apply
            # migrations + seed synthetic data + R2. Used by the browser smoke below; the
            # integration step seeds its OWN per-worker dirs (feature 063).
            - name: Seed local D1 + R2 (synthetic)
              run: pnpm e2e:seed

            # Parallel runner (feature 063): shards modules across worker processes, each with
            # its own isolated .wrangler/state-test-w<i> persist dir; cleaned up on completion.
            - name: Python integration tests (real D1 writebacks)
              run: pnpm test:py:integration

            # Build the real Workers app, serve it, run the browser smoke, tear it down.
            - name: Browser E2E smoke
              run: pnpm test:e2e
